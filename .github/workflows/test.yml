name: tests
on:
  push:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run test:report
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-report
          path: reports/junit.xml



