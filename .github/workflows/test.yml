name: tests
on:
  push:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run test:report
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-report
          path: reports/
      - name: Job summary
        if: always()
        run: |
          xml=$(ls reports/junit-*.xml 2>/dev/null | head -1)
          if [ -f "$xml" ]; then
            tests=$(grep -o 'tests="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*')
            fails=$(grep -o 'failures="[0-9]*"' "$xml" | head -1 | grep -o '[0-9]*')
            echo "### 🧪 $tests tests · $fails failures" >> "$GITHUB_STEP_SUMMARY"
            echo "Full report: download the **test-report** artifact below and open \`report-*.html\` — self-contained, no server needed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ⚠️ No JUnit report was generated" >> "$GITHUB_STEP_SUMMARY"
          fi



